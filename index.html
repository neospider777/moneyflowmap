<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"><meta name="theme-color" content="#06080c"><title>머니플로우맵 · 주도테마 캘린더</title><style>
:root{--bg:#06080c;--card:#0b0e15;--card2:#0e131c;--panel:#111723;--line:#1a2230;--line2:#2a3850;
 --text:#eaeef6;--muted:#8a96ab;--dim:#6e7a90;--up:#ff4d63;--down:#4d9fff;--brand:#ff2d83;--brand2:#9d6bff;
 --kr:'Noto Sans CJK KR','Noto Sans KR','Apple SD Gothic Neo',sans-serif;--mono:ui-monospace,'DejaVu Sans Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#000;color:var(--text);font-family:var(--kr);-webkit-font-smoothing:antialiased}
#app{max-width:560px;margin:0 auto;min-height:100vh;background:linear-gradient(168deg,var(--card2),var(--card) 60%);
 padding:18px 14px 30px;position:relative}
.hd{display:flex;align-items:flex-end;gap:12px;padding:6px 4px 0}
.hd .eb{font-family:var(--mono);font-size:11px;letter-spacing:.22em;color:var(--brand);font-weight:700}
.hd .mo{font-size:30px;font-weight:900;letter-spacing:-.02em;line-height:1;margin-top:3px}
.hd .nav{margin-left:auto;display:flex;gap:8px;align-items:center}
.hd .nav button{width:38px;height:38px;border:1px solid var(--line2);background:var(--panel);color:var(--text);
 border-radius:10px;font-size:18px;font-weight:800;cursor:pointer}
.hd .nav button:active{background:var(--brand);color:#180010;border-color:var(--brand)}
.hd .nav button:disabled{opacity:.3}
.sub{font-family:var(--mono);font-size:11px;color:var(--muted);padding:8px 4px 0;font-weight:600}
.sub b{color:var(--brand)}
.wds{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:14px}
.wd{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--dim);text-align:center;padding:4px 0;letter-spacing:.04em}
.wd.we{color:#46506a}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:6px}
.cell{aspect-ratio:1;background:var(--panel);border:1px solid var(--line);border-top:3px solid var(--line);
 border-radius:9px;padding:7px 6px;display:flex;flex-direction:column;overflow:hidden;position:relative}
.cell.empty{background:rgba(13,17,24,.45)}
.cell .dn{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--dim);line-height:1}
.cell.has{cursor:pointer}
.cell>*{flex:none}
.cell.has .dn{color:var(--text)}
.cell.has:active{transform:scale(.96);transition:transform .05s}
.cell .th{font-size:12px;font-weight:900;letter-spacing:-.02em;margin-top:6px;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cell .th .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle}
.cell .ld{font-size:11px;font-weight:700;color:#cfd6e3;margin-top:auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cell .pc{font-family:var(--mono);font-size:12px;font-weight:800;margin-top:auto;align-self:center}
.cell .pc.up{color:var(--up)}.cell .pc.down{color:var(--down)}
.cell .sec{position:absolute;top:7px;right:7px;display:flex;gap:3px}
.cell .sec i{width:8px;height:8px;border-radius:50%}
.cell .more{position:absolute;bottom:5px;right:6px;font-family:var(--mono);font-size:9px;color:var(--dim)}
.legend{display:flex;flex-wrap:wrap;gap:8px 14px;margin-top:16px;padding:14px 4px 0;border-top:1px solid var(--line)}
.lg{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:800;color:#dfe5f0}
.lg i{width:11px;height:11px;border-radius:4px}
.foot{font-family:var(--mono);font-size:10.5px;color:var(--dim);margin-top:14px;padding:0 4px;line-height:1.6}
.foot b{color:var(--muted)}.foot .h{color:var(--brand);font-weight:700}
/* modal / bottom sheet */
.modal{position:fixed;inset:0;z-index:50;display:flex;align-items:flex-end;justify-content:center}
.modal.hidden{display:none}
.modal .bk{position:absolute;inset:0;background:rgba(0,0,0,.62);backdrop-filter:blur(2px)}
.sheet{position:relative;width:100%;max-width:560px;max-height:86vh;overflow:auto;background:var(--card2);

.md-date{font-size:21px;font-weight:900;letter-spacing:-.01em}

.md-ix .down{color:var(--down)}.md-ix .up{color:var(--up)}

.thm .tt{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:900;letter-spacing:-.01em}
.thm .tt .dot{width:13px;height:13px;border-radius:50%;flex:none}
.thm .tt .tag{margin-left:auto;font-family:var(--mono);font-size:10px;font-weight:800;color:var(--muted)}
.rw{padding:10px 2px;border-top:1px solid var(--line)}

.rw:first-of-type{border-top:none;margin-top:6px}
.rw .nm{font-size:14.5px;font-weight:800;letter-spacing:-.01em}
.rw .bd{font-family:var(--mono);font-size:9.5px;font-weight:800;color:#180010;background:var(--brand);
 border-radius:5px;padding:3px 7px}
.rw .px{font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:auto}
.rw .pc{font-family:var(--mono);font-size:15px;font-weight:800;min-width:74px;text-align:right;margin-left:auto}
.rw .pc.up{color:var(--up)}.rw .pc.down{color:var(--down)}
.rw .td{font-family:var(--mono);font-size:11.5px;color:var(--dim);margin-top:5px;letter-spacing:.02em}
.rw .td b{color:#dfe5f0;font-weight:700}
.thm .nt{font-size:12.5px;line-height:1.5;color:var(--muted);margin-top:10px;padding-top:9px;border-top:1px solid var(--line)}
.md-flow{margin-top:16px;background:rgba(157,107,255,.09);border:1px solid rgba(157,107,255,.32);
 border-radius:12px;padding:13px 14px;font-size:13px;line-height:1.5;color:#cdc4ea}
.md-flow b{color:var(--brand);font-weight:800}
.md-dis{font-family:var(--mono);font-size:10px;color:var(--dim);margin-top:14px;line-height:1.6;text-align:center}
</style></head><body>

    <div class="nav"><button id="prev">‹</button><button id="next">›</button></div></div>

me": "증권", "title": "증권 — 거래대금 폭발 수혜 총출동", "rows": [{"name": "미래에셋증권", "tag": "대장", "pct": "+11.58%", "dir": "up", "td": "3,048억"}, {"name": "삼성증권", "pct": "+11.03%", "dir": "up", "td": "1,510억"}, {"name": "키움증권", "pct": "+9.15%", "dir": "up", "td": "872억"}, {"name": "대신증권", "pct": "+8.47%", "dir": "up", "td": "68억"}, {"name": "NH투자증권", "pct": "+8.46%", "dir": "up", "td": "403억"}], "note": "증권주 5개가 +8~11% 동반 급등. 지수 폭등(거래대금 급증)에 베팅하는 지수 수혜 테마."}], "flow_note": "코스닥·2차전지에서 빠진 돈이 코스피 반도체 대형주로 폭발 복귀. 지수 급등엔 증권주가 새로 붙었다. (코스피 +5.76% / 코스닥 +0.19%)"}};

const FALLBACK=["#818cf8","#22c55e","#e879f9","#38bdf8","#fb7185","#a3e635","#facc15"];
function computeColors(data){const c={};let fi=0;Object.keys(data).sort().forEach(d=>{(data[d].themes||[]).forEach(t=>{const k=t.theme;if(k&&!(k in c)){c[k]=(k in PIN)?PIN[k]:FALLBACK[(fi++)%FALLBACK.length];}});});return c;}
function computeMonths(data){return [...new Set(Object.keys(data).map(d=>d.slice(0,7)))].sort();}

function render(){

 const first=new Date(y,m-1,1); let start=(first.getDay()+6)%7; // Mon=0

   }).join('');
   return '<div class="thm" style="border-left-color:'+col+'">'
     +'<div class="tt"><span class="dot" style="background:'+col+'"></span>'+t.theme
     +'<span class="tag">주도테마 '+(i===0?'①':'②')+'</span></div>'+rows
     +(t.note?'<div class="nt">'+t.note+'</div>':'')+'</div>';
 }).join('');
 const flow=e.flow_note?'<div class="md-flow"><b>오늘 한 줄</b> — '+e.flow_note+'</div>':'';
 mbody.innerHTML='<div class="md-date">'+(e.date_label||k)+'</div>'+ix+blocks+flow
   +'<div class="md-dis">색 = 테마 · 빨강/파랑 = 등락 · 관찰 기록이며 투자권유 아님</div>';
 modal.classList.remove('hidden'); document.body.style.overflow='hidden';
}
function close(){modal.classList.add('hidden');document.body.style.overflow='';}
prev.onclick=()=>{if(idx>0){idx--;render();}};
next.onclick=()=>{if(idx<MONTHS.length-1){idx++;render();}};
modal.querySelector('.bk').onclick=close; modal.querySelector('.x').onclick=close;
function refresh(d){DATA=d;COLORS=computeColors(d);MONTHS=computeMonths(d);idx=MONTHS.length-1;render();}
refresh(SEED);
fetch('theme_log.json',{cache:'no-store'}).then(r=>r.ok?r.json():null).then(j=>{if(j&&Object.keys(j).length)refresh(j);}).catch(()=>{});
</script></body></html>
